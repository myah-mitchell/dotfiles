# yazi keymap — https://yazi-rs.github.io/docs/configuration/keymap

[manager]
prepend_keymap = [
  # Navigation — hjkl already work as default in yazi; these add extras
  { on = "H",       run = "back",              desc = "Go back in history" },
  { on = "L",       run = "forward",           desc = "Go forward in history" },

  # Open / interact
  { on = "<Enter>", run = "open",              desc = "Open file" },
  { on = "o",       run = "open --interactive", desc = "Open with..." },
  { on = "e",       run = "open --interactive", desc = "Open with..." },

  # Create / rename / delete
  { on = "a",       run = "create",            desc = "Create file or directory" },
  { on = "r",       run = "rename --cursor=before_ext", desc = "Rename" },
  { on = "d",       run = "remove",            desc = "Move to trash" },
  { on = "D",       run = "remove --permanently", desc = "Delete permanently" },

  # Copy / paste
  { on = "y",       run = "yank",              desc = "Yank (copy)" },
  { on = "Y",       run = "unyank",            desc = "Cancel yank" },
  { on = "x",       run = "yank --cut",        desc = "Cut" },
  { on = "p",       run = "paste",             desc = "Paste" },
  { on = "P",       run = "paste --force",     desc = "Paste (overwrite)" },

  # Selection
  { on = "v",       run = "toggle",            desc = "Toggle selection" },
  { on = "V",       run = "toggle_all",        desc = "Toggle all" },
  { on = "<C-a>",   run = "select_all",        desc = "Select all" },

  # Search
  { on = "/",       run = "find --smart-case", desc = "Find" },
  { on = "n",       run = "find_arrow",        desc = "Find next" },
  { on = "N",       run = "find_arrow --previous", desc = "Find previous" },

  # Filter
  { on = "f",       run = "filter --smart-case", desc = "Filter" },

  # Sort
  { on = ["s", "n"], run = "sort natural  --dir-first", desc = "Sort naturally" },
  { on = ["s", "m"], run = "sort modified --dir-first", desc = "Sort by modified" },
  { on = ["s", "s"], run = "sort size     --dir-first", desc = "Sort by size" },

  # Misc
  { on = ".",       run = "hidden toggle",     desc = "Toggle hidden files" },
  { on = "~",       run = "help",              desc = "Help" },
  { on = "<C-r>",   run = "refresh",           desc = "Refresh" },
  { on = "q",       run = "quit",              desc = "Quit" },

  # Tab management
  { on = "t",       run = "tab_create --current", desc = "New tab" },
  { on = "[",       run = "tab_switch -1 --relative", desc = "Prev tab" },
  { on = "]",       run = "tab_switch  1 --relative", desc = "Next tab" },
  { on = "1",       run = "tab_switch 0", desc = "Tab 1" },
  { on = "2",       run = "tab_switch 1", desc = "Tab 2" },
  { on = "3",       run = "tab_switch 2", desc = "Tab 3" },
]

# Compress files with ouch
[[mgr.prepend_keymap]]
on = ["C"]
run = "plugin ouch"
desc = "Compress with ouch"

# Copy yanked files to the system clipboard
[[mgr.prepend_keymap]]
on  = "y"
run = [ "yank", 'plugin clipboard -- --action=copy' ]

# Paste files from the system clipboard into the current directory
[[mgr.prepend_keymap]]
on  = "<C-p>"
run = [ 'plugin clipboard -- --action=paste' ]