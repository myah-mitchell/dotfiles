# yazi.toml — https://yazi-rs.github.io/docs/configuration/yazi

[manager]
ratio          = [1, 3, 4]   # parent:current:preview column width ratios
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5

[preview]
wrap           = "yes"
tab_size       = 4
max_width      = 1200
max_height     = 900
max_file_size  = 5_000_000  # 5MB
image_delay    = 30
image_filter   = "triangle"
image_quality  = 75

[opener]
edit = [
  { run = 'nvim "$@"', desc = "Neovim", block = true },
  { run = 'hx "$@"',   desc = "Helix",  block = true },
]
view = [
  { run = 'bat --paging=always "$@"', desc = "bat (paged)", block = true },
]
reveal = [
  { run = 'explorer.exe "$@"', desc = "Explorer (Windows)", os = "windows" },
  { run = 'xdg-open "$@"',     desc = "Default app",        os = "linux" },
]
play = [
  { run = 'mpv "$@"', orphan = true },
]

[open]
rules = [
  # Directories
  { mime = "inode/directory", use = "folder" },
  # Text / code
  { mime = "text/*",             use = ["edit", "view"] },
  { mime = "application/json",   use = ["edit", "view"] },
  { mime = "application/xml",    use = ["edit", "view"] },
  # Images — let yazi handle natively
  { mime = "image/*",            use = "image" },
  # Video / audio
  { mime = "video/*",            use = "play" },
  { mime = "audio/*",            use = "play" },
  # PDF
  { mime = "application/pdf",    use = "view" },
  # Fallback
  { mime = "*",                  use = ["edit", "view"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536_870_912  # 512 MB
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false
