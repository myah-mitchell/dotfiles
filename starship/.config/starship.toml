# starship.toml — Catppuccin Mocha themed prompt
# https://starship.rs/config/

palette = "catppuccin_mocha"

format = """
[](surface0)\
$os\
$username\
[](bg:blue fg:surface0)\
$directory\
[](fg:blue bg:peach)\
$git_branch\
$git_status\
$git_metrics\
[](fg:peach bg:green)\
$rust\
$golang\
$nodejs\
$python\
$java\
$lua\
$package\
docker_context\
conda\
php\
bun\
c\
kotlin\
kaskell\
[](fg:green bg:surface1)\
$cmd_duration\
[](fg:surface1 bg:surface0)\
$jobs\
[](fg:surface0)\
$line_break\
$character"""

right_format = """\
$status\
$time"""

[os]
disabled = false
style    = "bg:surface0 fg:text"

[os.symbols]
Windows   = "󰍲 "
Ubuntu    = "󰕈 "
SUSE      = " "
Raspbian  = "󰐿 "
Mint      = "󰣭 "
Macos     = "󰀵 "
Manjaro   = " "
Linux     = "󰌽 "
Gentoo    = "󰣨 "
Fedora    = "󰣛 "
Alpine    = " "
Amazon    = " "
Android   = " "
AOSC      = " "
Arch      = "󰣇 "
Artix     = "󰣇 "
CentOS    = " "
Debian    = "󰣚 "
NixOS     = "󱄅 "
Redhat    = "󱄛 "
Unknown   = "  "

[username]
show_always  = false
style_user   = "bg:surface0 fg:subtext1"
style_root   = "bg:surface0 fg:red bold"
format       = "[$user ]($style)"

[directory]
style              = "fg:base bg:blue bold"
format             = "[ $path ]($style)"
truncation_length  = 4
truncate_to_repo   = true
read_only          = "  "
read_only_style    = "fg:base bg:blue"
home_symbol        = "~"
repo_root_style    = "fg:base bg:blue bold"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Developer" = "󰲋 "

[git_branch]
symbol        = " "
style         = "bg:peach fg:base bold"
format        = "[ $symbol$branch ]($style)"
truncation_length = 20

[git_status]
style         = "bg:peach fg:base"
format        = "[$all_status$ahead_behind ]($style)"
conflicted    = "!${count} "
ahead         = "⇡${count} "
behind        = "⇣${count} "
diverged      = "⇕⇡${ahead_count}⇣${behind_count} "
untracked     = "?${count} "
stashed       = "$ "
modified      = "~${count} "
staged        = "+${count} "
renamed       = "»${count} "
deleted       = "✘${count} "

[git_metrics]
added_style   = "bold bg:peach fg:green"
deleted_style = "bold bg:peach fg:red"
format        = "([+$added]($added_style) )([-$deleted]($deleted_style) )"
disabled      = false

[rust]
symbol        = " "
style         = "bg:green fg:base"
format        = "[ $symbol($version) ]($style)"

[golang]
symbol        = " "
style         = "bg:green fg:base"
format        = "[ $symbol($version) ]($style)"

[nodejs]
symbol        = " "
style         = "bg:green fg:base"
format        = "[ $symbol($version) ]($style)"

[python]
symbol        = " "
style         = "bg:green fg:base"
format        = "[ $symbol($version) ]($style)"
pyenv_version_name = false

[java]
symbol        = " "
style         = "bg:green fg:base"
format        = "[ $symbol($version) ]($style)"

[lua]
symbol        = "  "
style         = "bg:green fg:base"
format        = "[ $symbol($version) ]($style)"

[package]
symbol        = "󰏗 "
style         = "bg:green fg:base"
format        = "[ $symbol$version ]($style)"

[docker_context]
symbol        = " "
style         = "bg:green fg:base"
format        = '[ $symbol($context) ]($style)'

[conda]
symbol        = " "
style         = "bg:green fg:base"
format        = '[ $symbol$environment ]($style)'
ignore_base   = false

[php]
symbol        = " "
style         = "bg:green"
format        = '[ $symbol($verion) ]($style)'

[bun]
symbol        = " "
style         = "bg:green"
format        = '[ $symbol($verion) ]($style)'

[c]
symbol        = " "
style         = "bg:green"
format        = '[ $symbol($verion) ]($style)'

[kotlin]
symbol        = " "
style         = "bg:green"
format        = '[ $symbol($verion) ]($style)'

[haskell]
symbol        = " "
style         = "bg:green"
format        = '[ $symbol($verion) ]($style)'

[cmd_duration]
min_time      = 2_000
style         = "bg:surface1 fg:subtext1"
format        = "[ 󱎫 $duration ]($style)"

[jobs]
style         = "bg:surface0 fg:yellow"
format        = "[ $symbol$number ]($style)"
symbol        = " "
number_threshold = 1

[status]
style         = "fg:red"
format        = "[$symbol $status ]($style)"
symbol        = "✖"
success_symbol = ""
not_found_symbol = "󰍉"
sigint_symbol = ""
disabled      = false

[time]
disabled      = false
time_format   = "%H:%M"
style         = "fg:overlay0"
format        = "[$time ]($style)"

[character]
success_symbol  = "[❯](bold green)"
error_symbol    = "[❯](bold red)"
vimcmd_symbol   = "[❮](bold lavender)"
vimcmd_replace_one_symbol = "[❮](bold mauve)"
vimcmd_replace_symbol     = "[❮](bold mauve)"
vimcmd_visual_symbol      = "[❮](bold yellow)"

# ── Catppuccin Mocha palette ──────────────────────────────────────────────────
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"
