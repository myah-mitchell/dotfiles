"$schema" = 'https://starship.rs/config-schema.json'

format = """
[î‚¶](color_surface0)\
$os\
$time\
[î‚´î°ƒ](fg:prev_bg bg:color_maroon)\
$sudo\
$username\
$hostname\
[î‚´î°ƒ](fg:prev_bg bg:color_yellow)\
$directory\
[î‚´î°ƒ](fg:prev_bg bg:color_teal)\
$git_branch\
$git_commit\
$git_status\
[î‚´î°ƒ](fg:prev_bg bg:color_blue)\
$rust\
$nodejs\
$php\
$python\
[î‚´î°ƒ](fg:prev_bg bg:color_mauve)\
$docker_context\
$jobs\
[î‚´î°ƒ](fg:prev_bg bg:color_surface0)\
$cmd_duration\
[î‚´î°ƒ](fg:prev_bg)\
$line_break$character"""


# Options
palette = 'catppuccin_mocha'
continuation_prompt = '--> '
add_newline = true

# Modules (in used order)
# Gray Pill
[os]
disabled = false
style = "bg:prev_bg fg:color_crust"
format = "[$symbol]($style)"

[time]
disabled = false
time_format = "%F %R:%6f"
style = "bg:prev_bg fg:color_text "
format = '[$time ]($style)'

# Red Pill

[sudo]
symbol = "َ±ژڑ"
disabled = false
style = "bg:prev_bg fg:color_crust"
format = "[$symbolî°ƒSUDO ]($style)"

[username]
show_always = true
style_user = "bg:prev_bg fg:color_crust"
style_root = "bg:prev_bg fg:prev_fg"
format = '[ï€‡î°ƒ$user]($style)'

[hostname]
ssh_symbol = "ï„ˆ"
ssh_only = false
trim_at = '.l'
style = "bg:prev_bg fg:prev_fg "
format = "[@$hostname ($ssh_symbol )]($style)"

# Yellow Pill

[directory]
read_only = "َ°Œ¾"
truncate_to_repo = false
truncation_length = 10
truncation_symbol = "â€¦/"
style = "bg:prev_bg fg:color_crust"
format = "[($read_onlyî°ƒ)]($style)[$path ]($style)"

# Green Pill

[git_branch]
symbol = "ïگکî°ƒ"
style = "bg:prev_bg fg:color_crust "
format = "[$symbol$branch ]($style)"

[git_commit]
tag_symbol = "ًںڈ·î°ƒ"
commit_hash_length = 7
style = "bg:prev_bg fg:prev_fg"
format = "[$hash$tag ]($style)"	

[git_status]
style = "bg:prev_bg fg:color_crust" # fg redefined, as prev module may not exist
format = '[($all_status$ahead_behind )]($style)'

# Blue Pill

[rust]
symbol = "î‍¨î°ƒ"
style = "bg:prev_bg fg:color_crust" # fg redefined, as prev module may not exist
format = '[$symbol( $version) ]($style)'

[nodejs]
symbol = "îœکî°ƒ"
style = "fbg:prev_bg g:color_crust"
format = '[$symbol( $version) ](fg:color_crust bg:prev_bg)' # bug, must set explicitly

[php]
symbol = "îکˆî°ƒ"
style = "bg:prev_bg fg:color_crust" # fg redefined, as prev module may not exist
format = '[$symbol( $version) ]($style)'

[python]
symbol = "îک†î°ƒ"
style = "bg:prev_bg fg:color_crust" # fg redefined, as prev module may not exist
format = '[$symbol( $version)( $virtualenv) ]($style)' 

# Purple Pill

[docker_context]
symbol = "ïŒˆî°ƒ"
style = "bg:prev_bg fg:color_crust" # fg redefined, as prev module may not exist
format = '[$symbol( $context) ]($style)'

[jobs]
symbol = "َ°†…î°ƒ"
symbol_threshold = 2
number_threshold = 2
style = "bg:prev_bg fg:color_crust" # fg redefined, as prev module may not exist
format = "[$symbol($number )]($style)"

# Gray Pill

[cmd_duration]
min_time = 1_000
show_milliseconds = true
style = "bg:prev_bg fg:prev_fg"
format = "[ï‰’î°ƒ$duration ]($style)"

# New Line

[character]
disabled = false
success_symbol = '[ïپ،](bold fg:color_green)'
error_symbol = '[ïپ،](bold fg:color_red)'

